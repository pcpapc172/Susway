name: Build all platforms

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.targetPlatform }}
    runs-on: [self-hosted, Windows, X64, unity-2019]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
          - StandaloneOSX
          - Android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Unity installation
        shell: powershell
        env:
          UNITY_EDITOR: C:\Program Files\Unity\Hub\Editor\2019.4.41f2\Editor\Unity.exe
        run: |
          if (-not (Test-Path -LiteralPath $env:UNITY_EDITOR)) {
            throw "Unity 2019.4.41f2 is not installed at $env:UNITY_EDITOR"
          }

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.name }}-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.name }}-${{ matrix.targetPlatform }}-

      - name: Build
        shell: powershell
        env:
          UNITY_EDITOR: C:\Program Files\Unity\Hub\Editor\2019.4.41f2\Editor\Unity.exe
        run: |
          $log = Join-Path $env:RUNNER_TEMP "unity-${{ matrix.targetPlatform }}.log"
          $arguments = @(
            '-quit',
            '-projectPath', $env:GITHUB_WORKSPACE,
            '-executeMethod', 'CIBuilder.Build',
            '-ciTarget', '${{ matrix.targetPlatform }}',
            '-logFile', $log
          )
          $process = Start-Process `
            -FilePath $env:UNITY_EDITOR `
            -ArgumentList $arguments `
            -Wait `
            -PassThru
          Get-Content -LiteralPath $log
          if ($process.ExitCode -ne 0) {
            throw "Unity exited with code $($process.ExitCode)"
          }

      - name: Verify build output
        shell: powershell
        run: |
          $output = "build/${{ matrix.targetPlatform }}"
          if (-not (Test-Path -LiteralPath $output)) {
            throw "Missing build directory: $output"
          }
          if (-not (Get-ChildItem -LiteralPath $output -File -Recurse | Select-Object -First 1)) {
            throw "Build directory is empty: $output"
          }

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Subway-Surfers-Resurferd-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish workflow build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download every platform build
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          for directory in artifacts/*; do
            name="$(basename "$directory")"
            (cd "$directory" && zip -qr "../../release/${name}.zip" .)
          done
          test "$(find release -name '*.zip' | wc -l)" -eq 4

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: true
          fail_on_unmatched_files: true
          files: release/*.zip
