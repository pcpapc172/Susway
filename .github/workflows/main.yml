name: Build Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
          - StandaloneOSX
          - Android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**','Packages/**','ProjectSettings/**') }}
          restore-keys: Library-

      - name: Build
        id: buildStep
        uses: game-ci/unity-builder@v4
        continue-on-error: true
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2019.4.41f2
          targetPlatform: ${{ matrix.targetPlatform }}
          androidKeystoreName: ${{ secrets.ANDROID_KEYSTORE_NAME }}
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      # Zip desktop builds
      - name: Zip build
        if: matrix.targetPlatform != 'Android'
        run: |
          cd build/${{ matrix.targetPlatform }} 2>/dev/null || exit 0
          zip -r ../../Subway-Surfers-Resurferd-${{ matrix.targetPlatform }}.zip . || true
          cd ../../

      # Rename APK
      - name: Rename APK
        if: matrix.targetPlatform == 'Android'
        run: |
          APK_PATH=$(find build/Android -name "*.apk" | head -n 1 || true)
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" Subway-Surfers-Resurferd-Android.apk
          fi

      # Upload build artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.targetPlatform }}
          path: |
            Subway-Surfers-Resurferd-${{ matrix.targetPlatform }}.zip
            Subway-Surfers-Resurferd-Android.apk
          if-no-files-found: ignore

      # ✅ Save emoji build status
      - name: Save status
        if: always()
        run: |
          if [ "${{ steps.buildStep.outcome }}" = "success" ]; then
            echo "✅ ${{ matrix.targetPlatform }}" > status.txt
          else
            echo "❌ ${{ matrix.targetPlatform }}" > status.txt
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: status-${{ matrix.targetPlatform }}
          path: status.txt

  release:
    name: Create prerelease
    if: always()
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Merge status
        run: |
          cat artifacts/status-*/status.txt > BUILD_STATUS.md || echo "No status"

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_attempt }}
          name: Build ${{ github.run_number }}
          prerelease: true
          body_path: BUILD_STATUS.md
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
