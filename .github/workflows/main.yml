name: Build Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
          - StandaloneOSX
          - Android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2019.4.41f2
          targetPlatform: ${{ matrix.targetPlatform }}
          androidKeystoreName: ${{ secrets.ANDROID_KEYSTORE_NAME }}
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      # Zip desktop builds
      - name: Zip build
        if: matrix.targetPlatform != 'Android'
        run: |
          cd build/${{ matrix.targetPlatform }} 2>/dev/null || exit 0
          zip -r ../../ABUPPLUS-${{ matrix.targetPlatform }}.zip . || true
          cd ../../

      # Rename APK
      - name: Rename APK
        if: matrix.targetPlatform == 'Android'
        run: |
          APK_PATH=$(find build/Android -name "*.apk" | head -n 1 || true)
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" ABUPPLUS-Android.apk
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.targetPlatform }}
          path: |
            ABUPPLUS-${{ matrix.targetPlatform }}.zip
            ABUPPLUS-Android.apk
          if-no-files-found: ignore

  release:
    name: Create prerelease
    if: always()   # ⭐ KEY LINE
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Show files
        run: ls -R artifacts || true

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
