name: Build all platforms

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license:
    name: Check Unity Pro credentials
    runs-on: ubuntu-latest
    steps:
      - name: Require Unity Pro secrets
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "$UNITY_SERIAL" || -z "$UNITY_EMAIL" || -z "$UNITY_PASSWORD" ]]; then
            echo "::error::Add UNITY_SERIAL, UNITY_EMAIL, and UNITY_PASSWORD as repository Actions secrets."
            exit 1
          fi

  build:
    name: ${{ matrix.targetPlatform }}
    needs: license
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
          - StandaloneOSX
          - Android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2019.4.41f2
          targetPlatform: ${{ matrix.targetPlatform }}
          buildsPath: build

      - name: Verify build output
        shell: bash
        run: |
          test -d "build/${{ matrix.targetPlatform }}"
          test -n "$(find "build/${{ matrix.targetPlatform }}" -type f -print -quit)"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Subway-Surfers-Resurferd-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish workflow build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download every platform build
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          for directory in artifacts/*; do
            name="$(basename "$directory")"
            (cd "$directory" && zip -qr "../../release/${name}.zip" .)
          done
          test "$(find release -name '*.zip' | wc -l)" -eq 4

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: true
          fail_on_unmatched_files: true
          files: release/*.zip
